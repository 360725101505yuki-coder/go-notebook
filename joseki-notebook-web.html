const normalizeKind = k => k === "fuseki" ? "fuseki" : "joseki";

// IndexedDB に保存し、次回起動時も同じファイルと連携できるようにする。

const DB_NAME = "joseki-fs-db";
const DB_STORE = "handles";
const HANDLE_KEY = "dataFileHandle";
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(DB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGetHandle() {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(HANDLE_KEY);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
async function idbSetHandle(handle) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(handle, HANDLE_KEY);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbClearHandle() {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).delete(HANDLE_KEY);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// 好きな局面までの手順を「定石」として取り込めるようにする。

// SGFは列がa〜s（左→右＝1〜19）、行がa〜s（上→下）。
// このアプリの row は下から数える（星の定義などと合わせるため）ので反転する。
function sgfCoordToPoint(v) {

  const c = v.charCodeAt(0) - 96; // a=1

  return {
    col: c,
    row: 20 - r

          continue;

        i++;
      }
      skipWs();

      while (i < len && text[i] === "[") {

        skipWs();

    const nodes = [];
    skipWs();
    while (i < len && text[i] === ";") {
      nodes.push(parseNode());
      skipWs();
    }
    return nodes;
  };
  const parseGameTree = () => {
    skipWs();
    if (text[i] !== "(") return null;
    i++; // "(" を読み飛ばす
    const sequence = parseSequence();
    const subtrees = [];
    skipWs();
    while (i < len && text[i] === "(") {
      subtrees.push(parseGameTree());
      skipWs();
    }

      sequence,
      subtrees

    throw new Error("SGFの解析に失敗しました（対局木が見つかりません）");
  }

    let prev = parentNode;
    let first = null;
    for (const props of tree.sequence) {
      const node = {
        props,
        children: [],
        parent: prev

      if (!first) first = node;
      prev = node;
    }

    }
    return first;
  };
  const root = convert(gt, null);
  if (!root) throw new Error("SGFに手が含まれていません");
  return root;
}

// ノードが着手（B or W）を持っていれば {col, row, color} を返す
function sgfNodeMove(node) {
  if (!node || !node.props) return null;
  if (node.props.B) {
    const p = sgfCoordToPoint(node.props.B[0]);
    return p ? {
      col: p.col,
      row: p.row,
      color: "b"
    } : null;
  }
  if (node.props.W) {
    const p = sgfCoordToPoint(node.props.W[0]);
    return p ? {
      col: p.col,
      row: p.row,
      color: "w"
    } : null;
  }
  return null;
}

// ルートから指定ノードまでの経路（ノード配列）を返す
function sgfPathToNode(node) {
  const arr = [];
  let n = node;
  while (n) {
    arr.push(n);
    n = n.parent;
  }
  return arr.reverse();
}

// ノードのコメント（C[]）を1つの文字列で返す
function sgfNodeComment(node) {
  if (!node || !node.props || !node.props.C) return "";
  return node.props.C.join("\n");
}
